<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Force Management - Admin Panel</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root {
      --primary: #d4af37;
      --secondary: #1a1a2e;
      --accent: #e94560;
      --text-light: #ffffff;
      --bg-dark: #16213e;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--secondary);
      color: var(--text-light);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      color: var(--primary);
      margin: 0;
    }

    .btn-logout {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-logout:hover {
      background: #d92a47;
    }

    .admin-section {
      background: var(--bg-dark);
      border: 2px solid var(--primary);
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-weight: 600;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--primary);
      border-radius: 5px;
      background: #0f3460;
      color: var(--text-light);
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input[type="file"] {
      display: block;
      margin-bottom: 15px;
      color: var(--text-light);
    }

    .btn {
      background: var(--primary);
      color: var(--secondary);
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .btn:hover {
      background: #e8c547;
    }

    .btn-danger {
      background: var(--accent);
      color: white;
    }

    .btn-danger:hover {
      background: #d92a47;
    }

    .forces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .force-card {
      background: #0f3460;
      border: 2px solid var(--primary);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s;
    }

    .force-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
    }

    .force-logo {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      margin: 0 auto 15px;
      border: 2px solid var(--primary);
      display: block;
    }

    .force-logo-placeholder {
      width: 150px;
      height: 150px;
      background: #1a1a2e;
      border: 2px dashed var(--primary);
      border-radius: 10px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .force-name {
      font-size: 18px;
      color: var(--primary);
      margin: 10px 0;
      font-weight: 600;
    }

    .force-desc {
      font-size: 13px;
      color: #b0b0b0;
      margin: 10px 0;
      min-height: 40px;
    }

    .force-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .force-actions button {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }

    .success, .error {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .success {
      background: #28a745;
      color: white;
    }

    .error {
      background: #dc3545;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-dark);
      border: 2px solid var(--primary);
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 15px;
    }

    .modal-header h2 {
      margin: 0;
      color: var(--primary);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 24px;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚔️ Force Management</h1>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div id="message"></div>

    <!-- Create Force Section -->
    <div class="admin-section">
      <h2 style="color: var(--primary); margin-top: 0;">Create New Force</h2>
      <form id="createForceForm">
        <div class="form-group">
          <label for="forceName">Force Name (e.g., Sukuna & Co)</label>
          <input type="text" id="forceName" placeholder="Enter force name" required>
        </div>

        <div class="form-group">
          <label for="forceDesc">Description</label>
          <textarea id="forceDesc" placeholder="Enter force description"></textarea>
        </div>

        <div class="form-group">
          <label for="forceLogo">Force Logo Image</label>
          <input type="file" id="forceLogo" accept="image/*" required>
          <small style="color: #999;">Accepted formats: JPEG, PNG, GIF, WebP (Max 5MB)</small>
        </div>

        <button type="submit" class="btn">Create Force</button>
      </form>
    </div>

    <!-- Forces List -->
    <div class="admin-section">
      <h2 style="color: var(--primary); margin-top: 0;">Existing Forces</h2>
      <div id="forcesList" class="forces-grid">
        <div class="loading">Loading forces...</div>
      </div>
    </div>
  </div>

  <!-- Edit Force Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Force</h2>
        <button class="close-btn" onclick="closeEditModal()">×</button>
      </div>
      <form id="editForceForm">
        <input type="hidden" id="editForceId">
        
        <div class="form-group">
          <label for="editForceName">Force Name</label>
          <input type="text" id="editForceName" required>
        </div>

        <div class="form-group">
          <label for="editForceDesc">Description</label>
          <textarea id="editForceDesc"></textarea>
        </div>

        <div class="form-group">
          <label for="editForceLogo">Update Logo</label>
          <input type="file" id="editForceLogo" accept="image/*">
          <small style="color: #999;">Leave empty to keep current logo</small>
        </div>

        <button type="submit" class="btn">Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    // Load forces on page load
    document.addEventListener('DOMContentLoaded', () => {
      checkAdminAccess();
      loadForces();
    });

    // Check if user is admin
    async function checkAdminAccess() {
      try {
        const res = await fetch('/api/auth/me', {
          credentials: 'include'
        });
        const data = await res.json();
        if (!data.user || !data.user.is_admin) {
          showMessage('You do not have admin access', 'error');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 2000);
        }
      } catch (err) {
        console.error('Error checking admin access:', err);
      }
    }

    // Load all forces
    async function loadForces() {
      try {
        const res = await fetch('/api/forces', { credentials: 'include' });
        const forces = await res.json();
        
        if (!forces.length) {
          document.getElementById('forcesList').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No forces created yet</p>';
          return;
        }

        document.getElementById('forcesList').innerHTML = forces.map(force => `
          <div class="force-card">
            ${force.logo_url ? 
              `<img src="${force.logo_url}" alt="${force.name}" class="force-logo">` :
              `<div class="force-logo-placeholder">📛</div>`
            }
            <div class="force-name">${force.name}</div>
            <div class="force-desc">${force.description}</div>
            <div class="force-actions">
              <button class="btn" onclick="openEditModal(${force.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteForce(${force.id})">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        showMessage(`Error loading forces: ${err.message}`, 'error');
      }
    }

    // Create force form submission
    document.getElementById('createForceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('forceName').value;
      const desc = document.getElementById('forceDesc').value;
      const logoFile = document.getElementById('forceLogo').files[0];

      if (!logoFile) {
        showMessage('Please select a logo image', 'error');
        return;
      }

      const formData = new FormData();
      formData.append('name', name);
      formData.append('description', desc);
      formData.append('logo', logoFile);

      try {
        const res = await fetch('/api/forces', {
          method: 'POST',
          body: formData,
          credentials: 'include'
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to create force');
        }

        showMessage('Force created successfully!', 'success');
        document.getElementById('createForceForm').reset();
        loadForces();
      } catch (err) {
        showMessage(`Error: ${err.message}`, 'error');
      }
    });

    // Open edit modal
    function openEditModal(forceId) {
      const forces = JSON.parse(localStorage.getItem('forces') || '{}');
      fetch(`/api/forces/${forceId}`, { credentials: 'include' })
        .then(res => res.json())
        .then(force => {
          document.getElementById('editForceId').value = force.id;
          document.getElementById('editForceName').value = force.name;
          document.getElementById('editForceDesc').value = force.description;
          document.getElementById('editModal').classList.add('active');
        });
    }

    // Close edit modal
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    // Edit force form submission
    document.getElementById('editForceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const forceId = document.getElementById('editForceId').value;
      const name = document.getElementById('editForceName').value;
      const desc = document.getElementById('editForceDesc').value;
      const logoFile = document.getElementById('editForceLogo').files[0];

      try {
        // Update force info
        if (name || desc) {
          const res = await fetch(`/api/forces/${forceId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description: desc }),
            credentials: 'include'
          });

          if (!res.ok) throw new Error('Failed to update force');
        }

        // Update logo if provided
        if (logoFile) {
          const formData = new FormData();
          formData.append('logo', logoFile);

          const res = await fetch(`/api/forces/${forceId}/logo`, {
            method: 'PUT',
            body: formData,
            credentials: 'include'
          });

          if (!res.ok) throw new Error('Failed to update logo');
        }

        showMessage('Force updated successfully!', 'success');
        closeEditModal();
        loadForces();
      } catch (err) {
        showMessage(`Error: ${err.message}`, 'error');
      }
    });

    // Delete force
    async function deleteForce(forceId) {
      if (!confirm('Are you sure you want to delete this force?')) return;

      try {
        const res = await fetch(`/api/forces/${forceId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        if (!res.ok) throw new Error('Failed to delete force');

        showMessage('Force deleted successfully!', 'success');
        loadForces();
      } catch (err) {
        showMessage(`Error: ${err.message}`, 'error');
      }
    }

    // Show message
    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
      setTimeout(() => msgDiv.innerHTML = '', 5000);
    }

    // Logout
    function logout() {
      fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'include'
      }).then(() => window.location.href = '/login');
    }
  </script>
</body>
</html>
